apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: learning-k8s-rolebinding
  namespace: learning-k8s

subjects:
  - kind: ServiceAccount
    name: learning-k8s-sa
    namespace: learning-k8s

roleRef:
  kind: Role
  name: learning-k8s-role
  apiGroup: rbac.authorization.k8s.io