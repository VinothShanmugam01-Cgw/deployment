apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: learning-k8s-role
  namespace: learning-k8s

rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch